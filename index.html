<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Nanny Share</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: system-ui; max-width:600px; margin:auto; padding:20px;">

<h2>Nanny Share</h2>

<div id="auth"></div>
<hr/>

<div id="app" style="display:none;">
  <p id="user"></p>

  <textarea id="text" placeholder="Write update..." style="width:100%; height:80px;"></textarea>
  <br/>
  <button onclick="createPost()">Post</button>

  <hr/>

  <div id="feed"></div>
</div>

<script>

const supabase = window.supabase.createClient(
  "https://mzgrllluxkjppapgnmla.supabase.co",
  "YOUR_ANON_KEY"
);

/* ================= AUTH ================= */

async function getUser() {
  const { data } = await supabase.auth.getUser();
  return data.user;
}

async function login() {
  const email = prompt("Email:");
  const password = prompt("Password:");

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) alert(error.message);
  init();
}

async function signup() {
  const email = prompt("Email:");
  const password = prompt("Password:");

  const { error } = await supabase.auth.signUp({
    email,
    password
  });

  if (error) alert(error.message);
  alert("Check your email if confirmation is required.");
}

/* ================= INIT ================= */

async function init() {

  const user = await getUser();

  if (!user) {
    document.getElementById("auth").innerHTML = `
      <button onclick="login()">Login</button>
      <button onclick="signup()">Sign Up</button>
    `;
    return;
  }

  document.getElementById("auth").innerHTML =
    `<button onclick="logout()">Logout</button>`;

  document.getElementById("app").style.display = "block";
  document.getElementById("user").innerText = user.email;

  loadPosts();
}

async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

/* ================= POSTS ================= */

async function createPost() {
  const text = document.getElementById("text").value;
  const user = await getUser();

  await supabase.from("posts").insert({
    user_email: user.email,
    content: text
  });

  document.getElementById("text").value = "";
  loadPosts();
}

async function loadPosts() {
  const { data } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  (data || []).forEach(p => {
    const div = document.createElement("div");
    div.style.border = "1px solid #ddd";
    div.style.padding = "10px";
    div.style.marginBottom = "10px";

    div.innerHTML = `
      <b>${p.user_email}</b><br/>
      ${p.content}
    `;

    feed.appendChild(div);
  });
}

init();

</script>

</body>
</html>
