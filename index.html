<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>GoBuj Nanny Share</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:700px;
  margin:auto;
  padding:20px;
  background:#f5f5f5;
}

.card{
  background:white;
  border-radius:12px;
  padding:15px;
  margin-bottom:15px;
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.feed-item{
  border-bottom:1px solid #eee;
  padding:12px 0;
}

.feed-item img{
  width:100%;
  border-radius:8px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>👶 GoBuj Nanny Share</h1>

<div class="card">

<h3>Add Update</h3>

<select id="child">
  <option>Abby</option>
  <option>Other Baby</option>
</select>

<select id="type">
  <option>Bottle</option>
  <option>Nap</option>
  <option>Diaper</option>
  <option>Photo</option>
  <option>Note</option>
</select>

<textarea
  id="note"
  placeholder="What happened?"></textarea>

<input
  id="photo"
  type="file"
  accept="image/*">

<button onclick="saveUpdate()">
Post Update
</button>

</div>

<div class="card">

<h3>Today's Updates</h3>

<div id="feed"></div>

</div>

<script>

const SUPABASE_URL =
"https://mzgrllluxkjppapgnmla.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16Z3JsbGx1eGtqcHBhcGdubWxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyODEyMzQsImV4cCI6MjA5Njg1NzIzNH0.Jef9B7wu81gJgEwY8vnyxM8ZjaQaBcPQDR6PxZ1E2sA";

const supabase =
window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

async function saveUpdate(){

  let imageUrl = null;

  const file =
    document.getElementById("photo").files[0];

  if(file){

    const fileName =
      Date.now() + "-" + file.name;

    const upload =
      await supabase.storage
      .from("photos")
      .upload(fileName,file);

    if(upload.error){
      alert(upload.error.message);
      return;
    }

    imageUrl =
      supabase.storage
      .from("photos")
      .getPublicUrl(fileName)
      .data.publicUrl;
  }

  const result =
    await supabase
    .from("updates")
    .insert({
      child_name:
        document.getElementById("child").value,

      update_type:
        document.getElementById("type").value,

      note:
        document.getElementById("note").value,

      image_url:imageUrl
    });

  if(result.error){
    alert(result.error.message);
    return;
  }

  document.getElementById("note").value="";
  document.getElementById("photo").value="";

  loadFeed();
}

async function loadFeed(){

  const {data,error} =
    await supabase
    .from("updates")
    .select("*")
    .order("created_at",
      {ascending:false});

  if(error){
    console.log(error);
    return;
  }

  document.getElementById("feed").innerHTML =
    data.map(item => `

      <div class="feed-item">

        <strong>
          ${emoji(item.update_type)}
          ${item.child_name}
        </strong>

        <div>
          ${item.note || ""}
        </div>

        <small>
          ${new Date(
            item.created_at
          ).toLocaleString()}
        </small>

        ${
          item.image_url
          ?
          `<img src="${item.image_url}">`
          :
          ""
        }

      </div>

    `).join("");
}

function emoji(type){

  switch(type){

    case "Bottle":
      return "🍼";

    case "Nap":
      return "😴";

    case "Diaper":
      return "💩";

    case "Photo":
      return "📷";

    default:
      return "📝";
  }
}

loadFeed();

supabase
.channel("updates")
.on(
  "postgres_changes",
  {
    event:"*",
    schema:"public",
    table:"updates"
  },
  () => loadFeed()
)
.subscribe();

</script>

</body>
</html>
