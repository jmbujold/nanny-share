<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Nanny Share</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: system-ui; max-width:600px; margin:auto; padding:20px; background:#f6f6f6; }
    .card { background:white; padding:12px; border-radius:12px; margin-bottom:12px; }
    button { margin:4px; padding:8px 10px; border-radius:8px; border:1px solid #ddd; }
    textarea { width:100%; height:80px; }
  </style>
</head>

<body>

<h2>Nanny Share</h2>

<div id="auth"></div>

<hr/>

<div id="app" style="display:none;">
  <p id="user"></p>

  <div class="card">

    <textarea id="text" placeholder="Write update..."></textarea>

    <div>
      <b>Tag Babies:</b><br/>
      <button onclick="toggleBaby('baby_a')" id="baby_a_btn">Baby A</button>
      <button onclick="toggleBaby('baby_b')" id="baby_b_btn">Baby B</button>
    </div>

    <button onclick="createPost()">Post</button>
  </div>

  <h3>Feed</h3>
  <div id="feed"></div>
</div>

<script>

/* =======================
   SUPABASE (FIXED)
======================= */

const supabase = window.supabase.createClient(
  "https://mzgrllluxkjppapgnmla.supabase.co",
  "sb_publishable_OSl86zWHkSnpZ7TL_bn48w_MQ1y0Cr3" // 🔥 replace this with anon public key
);

/* =======================
   BABIES
======================= */

const BABIES = [
  { id: "baby_a", name: "Baby A" },
  { id: "baby_b", name: "Baby B" }
];

let selectedBabies = [];

/* =======================
   AUTH
======================= */

async function getUser() {
  const { data } = await supabase.auth.getUser();
  return data.user;
}

async function login() {
  const email = prompt("Email:");
  const password = prompt("Password:");

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) alert(error.message);
  init();
}

async function signup() {
  const email = prompt("Email:");
  const password = prompt("Password:");

  const { error } = await supabase.auth.signUp({
    email,
    password
  });

  if (error) alert(error.message);
  alert("Check email if confirmation is required.");
}

async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

/* =======================
   INIT
======================= */

async function init() {
  const user = await getUser();

  if (!user) {
    document.getElementById("auth").innerHTML = `
      <button onclick="login()">Login</button>
      <button onclick="signup()">Sign Up</button>
    `;
    return;
  }

  document.getElementById("auth").innerHTML =
    `<button onclick="logout()">Logout</button>`;

  document.getElementById("app").style.display = "block";
  document.getElementById("user").innerText = user.email;

  loadPosts();
}

/* =======================
   BABY TOGGLE
======================= */

function toggleBaby(id) {
  if (selectedBabies.includes(id)) {
    selectedBabies = selectedBabies.filter(b => b !== id);
  } else {
    selectedBabies.push(id);
  }

  updateBabyUI();
}

function updateBabyUI() {
  document.getElementById("baby_a_btn").style.background =
    selectedBabies.includes("baby_a") ? "#4ade80" : "white";

  document.getElementById("baby_b_btn").style.background =
    selectedBabies.includes("baby_b") ? "#4ade80" : "white";
}

/* =======================
   CREATE POST
======================= */

async function createPost() {
  const text = document.getElementById("text").value;
  const user = await getUser();

  await supabase.from("posts").insert({
    user_email: user.email,
    content: text,
    babies: selectedBabies
  });

  document.getElementById("text").value = "";
  selectedBabies = [];
  updateBabyUI();

  loadPosts();
}

/* =======================
   LOAD POSTS
======================= */

async function loadPosts() {

  const { data } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  (data || []).forEach(p => {

    const div = document.createElement("div");
    div.className = "card";

    const babyNames = (p.babies || [])
      .map(id => BABIES.find(b => b.id === id)?.name)
      .join(", ");

    div.innerHTML = `
      <b>${p.user_email}</b><br/>
      <small>${babyNames}</small>
      <p>${p.content}</p>
    `;

    feed.appendChild(div);
  });
}

/* =======================
   START
======================= */

init();

</script>

</body>
</html>
